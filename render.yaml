services:
  - type: web
    name: ai-interview-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        value: AI Interview
      - key: RESEND_API_URL
        value: https://api.resend.com/emails
      - key: GMAIL_API_CLIENT_ID
        sync: false
      - key: GMAIL_API_CLIENT_SECRET
        sync: false
      - key: GMAIL_API_REFRESH_TOKEN
        sync: false
      - key: GMAIL_API_FROM_EMAIL
        sync: false
      - key: GMAIL_API_FROM_NAME
        value: AI Interview
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: AI Interview
      - key: SMTP_USE_TLS
        value: "true"
      - key: ALLOW_INSECURE_OTP_RESPONSE
        value: "false"

  - type: web
    name: ai-interview-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ai-interview-final-aaki.onrender.com
